# Built-in embedding profiles for rag-common consumers (graph-layout-rag, repo-rag).
# Override or extend via RAG_EMBED_PROFILES_PATH and/or tool-local embed_profiles.toml.

[profiles.openai-large]
backend = "openai"
model = "text-embedding-3-large"
dimensions = 1024

[profiles.openai-small]
backend = "openai"
model = "text-embedding-3-small"
dimensions = 1024

[profiles.gemini]
backend = "gemini"
model = "gemini-embedding-001"
dimensions = 768

[profiles.gemini-2]
backend = "gemini"
model = "gemini-embedding-2-preview"
dimensions = 3072

[profiles.gemini-2-structure-v1]
backend = "gemini"
model = "gemini-embedding-2-preview"
dimensions = 3072

[profiles.gemini-2-code-3072]
backend = "gemini"
model = "gemini-embedding-2-preview"
dimensions = 3072

[profiles.mlx-qwen4b]
backend = "local"
model = "Qwen/Qwen3-Embedding-4B"
dimensions = 1024
quant = "4bit"

[profiles."mlx-qwen0.6b"]
backend = "local"
model = "Qwen/Qwen3-Embedding-0.6B"
dimensions = 1024
quant = "4bit"

[profiles.local-fp16-qwen4b]
backend = "local"
model = "Qwen/Qwen3-Embedding-4B"
dimensions = 1024

# Code-specialized, max fidelity: Qwen3-Embedding-4B at native 2560 dims, full
# precision (no Matryoshka truncation, no quant). Tops MTEB-Code (~80.7) — the
# recommended local profile for code retrieval when quality matters over speed.
# Free on Apple Silicon (MLX); slower + more memory than the 4-bit mlx-qwen4b.
[profiles.qwen3-code]
backend = "local"
model = "Qwen/Qwen3-Embedding-4B"
dimensions = 2560

# CUDA dense embed (Ubuntu GPU box): Qwen3-0.6B @ 1024, 4-bit via bitsandbytes when available.
[profiles."cuda-qwen0.6b-1024"]
backend = "local"
model = "Qwen/Qwen3-Embedding-0.6B"
dimensions = 1024
quant = "4bit"

# Same Qwen3-0.6B CUDA embedding stack as cuda-qwen0.6b-1024, with indexed
# text enriched by document/section metadata before embedding and BM25.
[profiles."cuda-qwen0.6b-section-v1"]
backend = "local"
model = "Qwen/Qwen3-Embedding-0.6B"
dimensions = 1024
quant = "4bit"

# Qwen3-0.6B CUDA dimension sweep profiles. Chunking stays identical to the
# baseline; only the embedding output dimension changes.
[profiles."cuda-qwen0.6b-512-v1"]
backend = "local"
model = "Qwen/Qwen3-Embedding-0.6B"
dimensions = 512
quant = "4bit"

[profiles."cuda-qwen0.6b-768-v1"]
backend = "local"
model = "Qwen/Qwen3-Embedding-0.6B"
dimensions = 768
quant = "4bit"

# Same Qwen3-0.6B CUDA embedding stack, plus local-LLM contextual retrieval.
[profiles."cuda-qwen0.6b-contextual-v1"]
backend = "local"
model = "Qwen/Qwen3-Embedding-0.6B"
dimensions = 1024
quant = "4bit"

# Same Qwen3-0.6B CUDA embedding stack, using smaller child chunks for a
# small-to-big retrieval probe while preserving document/section metadata.
[profiles."cuda-qwen0.6b-small2big-v1"]
backend = "local"
model = "Qwen/Qwen3-Embedding-0.6B"
dimensions = 1024
quant = "4bit"

# Same Qwen3-0.6B CUDA embedding stack, using larger section/page-span
# retrieval units for the LongRAG/larger-context campaign probe.
[profiles."cuda-qwen0.6b-longrag-v1"]
backend = "local"
model = "Qwen/Qwen3-Embedding-0.6B"
dimensions = 1024
quant = "4bit"

# CUDA dense embed quality probes on the Ubuntu GPU box: Qwen3-4B in 4-bit.
[profiles."cuda-qwen4b-1024"]
backend = "local"
model = "Qwen/Qwen3-Embedding-4B"
dimensions = 1024
quant = "4bit"

[profiles."cuda-qwen4b-2560"]
backend = "local"
model = "Qwen/Qwen3-Embedding-4B"
dimensions = 2560
quant = "4bit"
