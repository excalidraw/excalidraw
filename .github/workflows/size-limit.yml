name: "Bundle Size check @excalidraw/excalidraw"
on:
  pull_request:
    branches:
      - master
permissions:
  pull-requests: write
  contents: read
jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20.x
      - name: Install
        run: yarn
        working-directory: packages/excalidraw
        env:
          CI: true
      - name: Build
        run: yarn run build:esm
        working-directory: packages/excalidraw
      - name: Check bundle sizes
        id: size
        run: |
          node ../../scripts/size-check.js
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        working-directory: packages/excalidraw
      - name: Comment size report
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('packages/excalidraw/.size-limit-report.json', 'utf-8'));
            let body = '## size-limit report 📦\n\n';
            body += '| Path | Size | Status |\n';
            body += '|------|------|--------|\n';
            for (const r of results) {
              const status = r.passed ? '✅' : '❌';
              const size = (r.size / 1024).toFixed(1) + ' kB';
              body += `| ${r.name} | ${size} | ${status} |\n`;
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const sizeComment = comments.find(c => c.body.startsWith('## size-limit report'));
            if (sizeComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: sizeComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
