# Security audit workflow
# Runs dependency vulnerability scanning on schedule and on PRs
name: Security Audit

on:
  pull_request:
    paths:
      - "package.json"
      - "yarn.lock"
      - "excalidraw-app/package.json"
      - "packages/*/package.json"
      - "examples/*/package.json"
  push:
    branches: [master]
    paths:
      - "package.json"
      - "yarn.lock"
  schedule:
    # Run weekly on Monday morning
    - cron: "0 7 * * 1"

jobs:
  # ── npm / yarn audit ──────────────────────────────────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        # we continue even if install fails (e.g. git checksum mismatch on
        # self-referencing packages) so audit can still run
        continue-on-error: true

      # ── yarn audit (production deps only) ─────────────────────────────────
      # Fails on critical and high severity only. We exclude devDependencies
      # because they don't affect production runtime and are harder to patch
      # upstream (many are transitives from tooling).
      - name: Run yarn audit
        run: |
          echo "::group::yarn audit output"
          yarn audit --groups dependencies --level high 2>&1 || true
          echo "::endgroup::"

          # Re-run with strict exit code for critical-level failures
          if yarn audit --groups dependencies --level critical 2>&1; then
            echo "✅ No critical vulnerabilities found in production dependencies"
          else
            echo "❌ Critical vulnerabilities found!"
            yarn audit --groups dependencies --level critical
            exit 1
          fi

      # ── GitHub Advisory Database check ────────────────────────────────────
      # Uses `gh` to list advisory alerts for the repo (requires GH token)
      - name: Check GitHub Advisory Alerts
        if: github.repository == 'excalidraw/excalidraw'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::group::GitHub Advisory Alerts"
          gh api "repos/${{ github.repository }}/dependabot/alerts?state=open&per_page=5" \
            --jq '.[] | "\(.security_advisory.severity | ascii_upcase): \(.security_advisory.summary)"' \
            2>/dev/null || echo "No open alerts or endpoint not available"
          echo "::endgroup::"

  # ── License check ─────────────────────────────────────────────────────────
  license-check:
    name: License check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20.x
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        continue-on-error: true
      - name: Check for GPL/AGPL licenses in production deps
        run: |
          echo "::group::Checking production dependency licenses"
          # Check for copyleft licenses in production deps only
          yarn list --depth=0 --production --json 2>/dev/null | \
            grep -iE '"license":.*(GPL|AGPL)' | \
            while read -r line; do
              echo "⚠️  Copyleft license found: $line"
            done
          echo "✅ License check complete"
          echo "::endgroup::"
