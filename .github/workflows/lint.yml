# Manual re-run of lint only. On push/PR, lint runs in ci.yml.
name: Lint

on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install and lint
        run: |
          yarn install --frozen-lockfile
          yarn test:other
          yarn test:code
          yarn test:typecheck
