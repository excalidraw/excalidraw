# Builds excalidraw-app, then uploads to Cloudflare Pages with `wrangler pages deploy`.
# Do NOT use `wrangler deploy` here — that is Workers mode and needs `main` when `assets` is absent.
#
# GitHub: Settings → Secrets and variables → Actions
#   Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   Variables: CF_PAGES_PROJECT_NAME (e.g. ainur)
#   Variables (optional): VITE_TURNSTILE_SITE_KEY
#
# wrangler.jsonc must NOT contain "assets" (Pages rejects it). Workers Git builds
# should use wrangler.workers.jsonc or be disabled — see docs/cloudflare-deploy.md.

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
      - terraform-feature
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144
      GITHUB_SHA: ${{ github.sha }}
      VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build static app
        run: yarn build:pages

      - name: Verify build output
        run: test -f excalidraw-app/build/index.html

      - name: Deploy to Cloudflare Pages
        if: ${{ vars.CF_PAGES_PROJECT_NAME != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          PROJECT="${{ vars.CF_PAGES_PROJECT_NAME }}"
          echo "Running: wrangler pages deploy (not wrangler deploy)"
          if [ "${{ github.ref_name }}" = "master" ]; then
            npx wrangler@4 pages deploy ./excalidraw-app/build --project-name="$PROJECT"
          else
            npx wrangler@4 pages deploy ./excalidraw-app/build \
              --project-name="$PROJECT" \
              --branch="${{ github.ref_name }}"
          fi

      - name: Pages deploy skipped
        if: ${{ vars.CF_PAGES_PROJECT_NAME == '' }}
        run: |
          echo "::notice::Set Actions variable CF_PAGES_PROJECT_NAME (and secrets CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID)."
