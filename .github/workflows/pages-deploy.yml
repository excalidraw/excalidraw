# Builds excalidraw-app with CI-friendly Vite settings, then uploads static output
# to Cloudflare Pages via Wrangler (avoids Pages Git builder OOM on large Vite graphs).
#
# Configure in GitHub: Settings → Secrets and variables → Actions
#   Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   Variables: CF_PAGES_PROJECT_NAME (Cloudflare Pages project name)
#   Variables (optional): VITE_TURNSTILE_SITE_KEY (Turnstile site key for email signup)
#
# If CF_PAGES_PROJECT_NAME is unset, the workflow builds and skips deploy (green).
# Do not reference secrets in `if:` (GitHub restriction); gate deploy on vars only.
#
# Turn off automatic Git builds on the Cloudflare Pages project (Builds & deployments).
# If the dashboard runs `wrangler deploy`, it fails with:
#   Missing entry-point to Worker script or to assets directory
# This repo uses Pages (`wrangler.jsonc` has pages_build_output_dir, not main/assets).
#
# Deploy runs when a commit lands on `master` — that includes merging a PR into master.
# Align Cloudflare production branch with `master`, or edit the branch list below.

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144
      GITHUB_SHA: ${{ github.sha }}
      VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build static app
        run: yarn build:pages

      - name: Verify build output
        run: test -f excalidraw-app/build/index.html

      # Pages deploy only — NOT `wrangler deploy` (Workers). Repo root picks up
      # wrangler.jsonc (KV/D1 bindings) and /functions (e.g. api/event, api/email).
      - name: Deploy to Cloudflare Pages
        if: ${{ vars.CF_PAGES_PROJECT_NAME != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: yarn
          wranglerVersion: "4"
          command: pages deploy ./excalidraw-app/build --project-name=${{ vars.CF_PAGES_PROJECT_NAME }}

      - name: Pages deploy skipped
        if: ${{ vars.CF_PAGES_PROJECT_NAME == '' }}
        run: echo "::notice::Set repository variable CF_PAGES_PROJECT_NAME (and secrets CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID) to deploy."
