# Builds excalidraw-app with CI-friendly Vite settings, then uploads static output
# to Cloudflare Pages via Wrangler (avoids Pages Git builder OOM on large Vite graphs).
#
# Configure in GitHub: Settings → Secrets and variables → Actions
#   Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   Variables: CF_PAGES_PROJECT_NAME (Cloudflare Pages project name)
#
# If CF_PAGES_PROJECT_NAME is unset, the workflow builds and skips deploy (green).
# Do not reference secrets in `if:` (GitHub restriction); gate deploy on vars only.
#
# Turn off automatic Git builds on the Cloudflare Pages project (Builds & deployments),
# or pushes will still trigger Cloudflare’s builder and can fail (OOM) alongside this workflow.
#
# Deploy runs when a commit lands on `main` or `master` — that includes merging a PR
# into the branch (GitHub records a push to the base branch). Direct pushes to those
# branches also trigger a deploy. Align Cloudflare production branch (if Git-connected)
# with these names, or edit the list below.

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build static app
        run: yarn build:pages

      # Deploy from repo root so wrangler.jsonc picks up pages_build_output_dir and /functions.
      - name: Deploy to Cloudflare Pages
        if: ${{ vars.CF_PAGES_PROJECT_NAME != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy --project-name="${{ vars.CF_PAGES_PROJECT_NAME }}"

      - name: Pages deploy skipped
        if: ${{ vars.CF_PAGES_PROJECT_NAME == '' }}
        run: echo "::notice::Set repository variable CF_PAGES_PROJECT_NAME (and secrets CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID) to deploy."
