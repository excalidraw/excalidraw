# Mirrors local git hooks:
#   pre-push    → lint job + prepush job on PRs (full vitest+coverage, ESM build; Pages build is pages-deploy.yml)
#   test:commit → test job (yarn test:fast) — manual / workflow_dispatch only
#   size-limit  → size-limit.yml (PR bundle size comments)
name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prettier
        run: yarn test:other

      - name: ESLint
        run: yarn test:code

      - name: Typecheck
        run: yarn test:typecheck

      - name: Architecture lint (dependency-cruiser)
        run: yarn lint:arch

      - name: Oxlint (report-only)
        run: yarn lint:oxlint
        continue-on-error: true

      - name: Knip
        run: yarn knip

      - name: Depcheck
        run: yarn depcheck

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Vitest (fast suite)
        env:
          TERRAFORM_IMPORT_PRESETS_DB: packages/excalidraw/test-fixtures/terraform-import-presets.db
        run: yarn test:fast

  terraform-presets:
    name: Terraform preset seed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Verify committed terraform import presets test database
        run: yarn verify:terraform-presets-test-db

  prepush:
    name: Pre-push checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 55
    needs:
      - lint
      - test
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Test coverage
        id: test_coverage
        env:
          TERRAFORM_IMPORT_PRESETS_DB: packages/excalidraw/test-fixtures/terraform-import-presets.db
        run: yarn test:coverage

      - name: Report coverage on PR
        if: always() && hashFiles('coverage/coverage-summary.json') != ''
        uses: davelosert/vitest-coverage-report-action@2500dafcee7dd64f85ab689c0b83798a8359770e # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Coverage summary missing
        if: always() && hashFiles('coverage/coverage-summary.json') == ''
        run: echo "::warning::coverage/coverage-summary.json was not generated (install or vitest may have failed before coverage was written)."

      - name: Build @excalidraw/excalidraw ESM
        run: yarn workspace @excalidraw/excalidraw run build:esm

      - name: Size limit
        run: yarn workspace @excalidraw/excalidraw run check:size
