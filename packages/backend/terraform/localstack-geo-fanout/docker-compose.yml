services:
  localstack-acct-a:
    image: localstack/localstack:4
    container_name: localstack-geo-fanout-acct-a
    ports:
      - "4566:4566"
    environment:
      - SERVICES=lambda,apigateway,iam,ssm,s3,ec2,sts,logs
      - DEBUG=0
      - TEST_AWS_ACCOUNT_ID=111111111111
      - DEFAULT_REGION=us-east-1
    volumes:
      - localstack-acct-a-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  localstack-acct-b:
    image: localstack/localstack:4
    container_name: localstack-geo-fanout-acct-b
    ports:
      - "4567:4566"
    environment:
      - SERVICES=lambda,apigateway,iam,ssm,s3,ec2,sts,logs
      - DEBUG=0
      - TEST_AWS_ACCOUNT_ID=222222222222
      - DEFAULT_REGION=eu-west-1
    volumes:
      - localstack-acct-b-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  localstack-acct-a-data:
  localstack-acct-b-data:
